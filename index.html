<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Poster Editor</title>
<style>
  :root{--ub:#1a1a2e;--us:#16213e;--ubr:#0f3460;--ut:#e0e0e0;--ua:#e94560;--ua2:#5fd4e8;--ug:#2d8f5e;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--ub);color:var(--ut);display:flex;flex-direction:column;}

  /* TOOLBAR */
  .tb{background:var(--us);border-bottom:1px solid var(--ubr);padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;z-index:100;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tb h1{font-size:14px;font-weight:700;color:var(--ua);white-space:nowrap;}
  .td{width:1px;height:22px;background:var(--ubr);flex-shrink:0;}
  button{padding:8px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;color:var(--ut);min-height:36px;touch-action:manipulation;transition:all .12s;}
  .bp{background:var(--ua);color:#fff;}.bs{background:var(--ubr);}.bg{background:var(--ug);color:#fff;}.bw{background:#c77c14;color:#fff;}
  .fw{position:relative;display:inline-flex;flex-shrink:0;}.fw input[type="file"]{position:absolute;opacity:0;width:100%;height:100%;cursor:pointer;top:0;left:0;}
  .zc{display:flex;align-items:center;gap:3px;flex-shrink:0;}.zc button{padding:8px 10px;min-width:36px;justify-content:center;}
  .zl{font-size:11px;color:#aaa;min-width:36px;text-align:center;}

  /* MAIN */
  .mn{flex:1;display:flex;overflow:hidden;position:relative;}
  .cv{flex:1;overflow:auto;padding:20px;display:flex;justify-content:center;align-items:flex-start;background:#12121f;-webkit-overflow-scrolling:touch;}
  .pw{transform-origin:top center;flex-shrink:0;position:relative;}

  /* SIDEBAR */
  .sb{width:320px;background:var(--us);border-left:1px solid var(--ubr);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:200;}
  .sp{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch;}
  .sb-close{display:none;position:absolute;top:6px;right:8px;background:none;border:none;color:#888;font-size:24px;cursor:pointer;padding:10px;z-index:10;}
  .sb-toggle{display:none;position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--ua);color:#fff;border:none;font-size:22px;box-shadow:0 4px 20px rgba(233,69,96,.5);z-index:300;}
  .sb-header{padding:10px 12px;border-bottom:1px solid var(--ubr);font-size:11px;font-weight:700;color:var(--ua);text-transform:uppercase;letter-spacing:.5px;}

  /* FORM */
  .eg{margin-bottom:10px;}
  .eg label{display:block;font-size:9px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
  .eg select{width:100%;background:var(--ub);border:1px solid var(--ubr);border-radius:6px;color:var(--ut);font-size:16px;padding:8px 10px;-webkit-appearance:none;}
  .eg select:focus{outline:none;border-color:var(--ua);}
  .cr{display:flex;align-items:center;gap:8px;}
  .cr input[type="color"]{width:44px;height:44px;border:2px solid var(--ubr);border-radius:6px;cursor:pointer;background:none;padding:2px;}
  .cr input[type="color"]::-webkit-color-swatch-wrapper{padding:0;}
  .cr input[type="color"]::-webkit-color-swatch{border:none;border-radius:3px;}
  .cr input[type="text"]{flex:1;background:var(--ub);border:1px solid var(--ubr);border-radius:6px;color:var(--ut);font-family:monospace;font-size:13px;padding:8px;}
  .cr input[type="text"]:focus{outline:none;border-color:var(--ua);}
  .rr{display:flex;align-items:center;gap:8px;}
  .rr input[type="range"]{flex:1;height:6px;background:var(--ubr);border-radius:3px;outline:none;-webkit-appearance:none;}
  .rr input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--ua);cursor:pointer;}
  .rv{font-size:11px;color:#aaa;min-width:36px;text-align:right;font-family:monospace;}
  .dv{height:1px;background:var(--ubr);margin:12px 0;}
  .sec{font-size:9px;font-weight:700;color:var(--ua);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
  .badge{font-size:11px;padding:6px 8px;background:var(--ub);border-radius:6px;margin-bottom:10px;word-break:break-all;}
  .badge .t{color:var(--ua);font-weight:600;}.badge .c{color:var(--ua2);}
  .swr{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .sw{width:28px;height:28px;border-radius:4px;cursor:pointer;border:2px solid transparent;touch-action:manipulation;}
  .sw:active{border-color:#fff;transform:scale(1.1);}
  .ns{text-align:center;padding:30px 14px;color:#444;font-size:12px;line-height:1.7;}

  /* POSTER: editable highlight */
  .pw [contenteditable="true"]{outline:2px solid var(--ua);outline-offset:1px;cursor:text;}
  .pw [data-eidx].tap-highlight{outline:2px dashed rgba(233,69,96,.4);outline-offset:1px;}
  .pw .style-sel{outline:2px solid var(--ua2);outline-offset:1px;}

  /* THEME CARDS */
  .tc{background:var(--ub);border:1px solid var(--ubr);border-radius:6px;padding:10px 12px;margin-bottom:6px;cursor:pointer;display:flex;align-items:center;gap:10px;min-height:44px;touch-action:manipulation;}
  .tc:active{border-color:var(--ua);}
  .tn{font-size:12px;font-weight:600;color:#ccc;flex:1;}.tp{display:flex;gap:3px;}.ts{width:20px;height:16px;border-radius:3px;}

  /* WELCOME */
  .wl{flex:1;display:flex;align-items:center;justify-content:center;background:#12121f;padding:20px;}
  .wb{text-align:center;max-width:420px;width:100%;}
  .wb h2{font-size:20px;color:var(--ua);margin-bottom:8px;}
  .wb p{color:#666;font-size:14px;line-height:1.6;margin-bottom:20px;}

  /* TOAST */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ug);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.3);transition:transform .3s;z-index:999;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:900px){
    .td{display:none;}
    .sb{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;border:none;transform:translateY(100%);transition:transform .3s;border-radius:16px 16px 0 0;}
    .sb.vis{transform:translateY(0);}
    .sb-toggle{display:flex;align-items:center;justify-content:center;}
    .sb-close{display:block;}
    .cv{padding:10px;}
  }
  @media(max-width:480px){.tb h1{display:none;}.zc{display:none;}}
</style>
</head>
<body>

<div class="tb">
  <h1>Poster Editor</h1><div class="td"></div>
  <div class="fw"><button class="bs">Poster laden</button><input type="file" accept=".html,.htm" id="fi"></div>
  <button class="bs" id="bu" disabled>Undo</button>
  <div class="td"></div>
  <div class="zc"><button class="bs" id="zo">-</button><span class="zl" id="zl">70%</span><button class="bs" id="zi">+</button><button class="bs" id="zf">Fit</button></div>
  <div class="td"></div>
  <button class="bg" id="bx">HTML speichern</button>
  <button class="bp" id="bpdf">PDF</button>
</div>

<div class="mn">
  <div class="wl" id="wl">
    <div class="wb">
      <h2>Poster Editor</h2>
      <p>Lade dein HTML-Poster hoch.<br>Dann einfach auf einen Text tippen und direkt reinschreiben.<br>Fuer Farben und Styles: den Stift-Button nutzen.</p>
      <div class="fw"><button class="bp" style="font-size:16px;padding:14px 28px;">HTML-Poster laden</button><input type="file" accept=".html,.htm" class="fa"></div>
    </div>
  </div>

  <div class="cv" id="cv" style="display:none"><div class="pw" id="pw"></div></div>

  <div class="sb" id="sb" style="display:none">
    <button class="sb-close" id="sbc">&times;</button>
    <div class="sb-header" id="sbh">Style bearbeiten</div>
    <div class="sp" id="sp">
      <div class="ns" id="ns0">Tippe auf ein Element und dann hier fuer Farben &amp; Styles</div>
      <div id="sc" style="display:none"></div>
    </div>
  </div>
</div>

<button class="sb-toggle" id="sbt" style="display:none">&#9998;</button>
<div class="toast" id="toast"></div>

<script>
(function(){
const $=id=>document.getElementById(id);
let origHTML='',curEl=null,zoom=.7,undos=[],fname='poster.html';
let isMob=window.innerWidth<=900;
const pw=$('pw'),cv=$('cv'),sb=$('sb'),sc=$('sc'),ns0=$('ns0'),zl=$('zl'),toastEl=$('toast');

const PAL=['#0097B2','#007A91','#003B46','#005F6B','#E0F4F8','#5FD4E8','#FF6B35','#1A1A1A','#2D2D2D','#6B6B6B','#FAFAF8','#FFFFFF','#E2E2E0','#2D8F5E','#E8F5EE','#F5F5F5'];
const FONTS=['DM Sans','Playfair Display','JetBrains Mono','Roboto','Open Sans','Lato','Montserrat','Poppins','Inter','Raleway','Nunito','Merriweather','Work Sans','Fira Sans','Barlow','Outfit','Space Grotesk','Crimson Text','Libre Baskerville','EB Garamond','Lora'];
const THEMES=[
  {n:'Original (Teal)',c:{'--c-accent':'#0097B2','--c-accent-dark':'#007A91','--c-accent-light':'#E0F4F8','--c-highlight':'#FF6B35','--c-bg':'#FAFAF8','--c-dark':'#1A1A1A','--c-text':'#2D2D2D','--c-card':'#FFFFFF','--c-border':'#E2E2E0'},p:['#0097B2','#FF6B35','#FAFAF8','#1A1A1A']},
  {n:'Navy & Gold',c:{'--c-accent':'#1B3A5C','--c-accent-dark':'#0F2744','--c-accent-light':'#E8EEF4','--c-highlight':'#D4A843','--c-bg':'#F8F8F6','--c-dark':'#1A1A1A','--c-text':'#2D2D2D','--c-card':'#FFFFFF','--c-border':'#D8D8D6'},p:['#1B3A5C','#D4A843','#F8F8F6','#1A1A1A']},
  {n:'Emerald',c:{'--c-accent':'#2D8F5E','--c-accent-dark':'#1F6B44','--c-accent-light':'#E8F5EE','--c-highlight':'#E85D4A','--c-bg':'#FAFAF8','--c-dark':'#1A1A1A','--c-text':'#2D2D2D','--c-card':'#FFFFFF','--c-border':'#E2E2E0'},p:['#2D8F5E','#E85D4A','#FAFAF8','#1A1A1A']},
  {n:'Purple',c:{'--c-accent':'#6B4C9A','--c-accent-dark':'#4E3677','--c-accent-light':'#F0EBF8','--c-highlight':'#E8A838','--c-bg':'#FAFAF8','--c-dark':'#1E1E2E','--c-text':'#2D2D3D','--c-card':'#FFFFFF','--c-border':'#E0DDE6'},p:['#6B4C9A','#E8A838','#FAFAF8','#1E1E2E']},
  {n:'Ocean Blue',c:{'--c-accent':'#1976D2','--c-accent-dark':'#1565C0','--c-accent-light':'#E3F2FD','--c-highlight':'#FF7043','--c-bg':'#FAFCFF','--c-dark':'#1A1A2E','--c-text':'#2D2D3D','--c-card':'#FFFFFF','--c-border':'#E0E4EA'},p:['#1976D2','#FF7043','#FAFCFF','#1A1A2E']},
  {n:'Rose',c:{'--c-accent':'#C2185B','--c-accent-dark':'#AD1457','--c-accent-light':'#FCE4EC','--c-highlight':'#5C6BC0','--c-bg':'#FAFAFA','--c-dark':'#263238','--c-text':'#37474F','--c-card':'#FFFFFF','--c-border':'#E0E0E0'},p:['#C2185B','#5C6BC0','#FAFAFA','#263238']},
];

// === MOBILE SIDEBAR ===
const sbt=$('sbt'),sbc=$('sbc');
function chkM(){isMob=window.innerWidth<=900;if(!isMob){sbt.style.display='none';}else if(cv.style.display==='flex'){sbt.style.display='flex';}}
sbt.addEventListener('click',()=>{sb.style.display='flex';sb.classList.add('vis');});
sbc.addEventListener('click',()=>{sb.classList.remove('vis');setTimeout(()=>{if(isMob)sb.style.display='none';},300);});

// === FILE LOAD ===
$('fi').addEventListener('change',hf);
document.querySelector('.fa')?.addEventListener('change',hf);
function hf(e){const f=e.target.files[0];if(!f)return;fname=f.name;const r=new FileReader();r.onload=v=>{origHTML=v.target.result;load(origHTML);};r.readAsText(f);}

function load(html){
  const doc=new DOMParser().parseFromString(html,'text/html');
  const p=doc.querySelector('.poster');
  if(!p){toast('Kein .poster gefunden!');return;}
  pw.innerHTML='';
  doc.querySelectorAll('link[href*="fonts"]').forEach(l=>{
    if(!document.querySelector('link[href="'+l.href+'"]')){const nl=document.createElement('link');nl.rel='stylesheet';nl.href=l.href;document.head.appendChild(nl);}
  });
  doc.querySelectorAll('style').forEach(s=>{const ns=document.createElement('style');ns.textContent=s.textContent;ns.id='posterCSS';pw.appendChild(ns);});
  pw.appendChild(p);
  makeEditable(p);
  $('wl').style.display='none';cv.style.display='flex';
  if(!isMob){sb.style.display='flex';}
  chkM();fitZ();undos=[];$('bu').disabled=true;
  toast('Poster geladen! Tippe auf Text zum Bearbeiten.');
}

// === MAKE TEXT DIRECTLY EDITABLE ===
const TEXT_TAGS=['h1','h2','h3','h4','h5','h6','p','li','td','th','span','strong','em','a'];
const TEXT_CLS=['category','uni-label','uni-name','course','finding-eyebrow','finding-text','finding-sub','stat-value','stat-label','stat-detail','chart-title','bar-val','bar-label','journal-name','journal-ref','section-label','box-label','footer-left','footer-right','flow-text','flow-box','flow-num'];

function makeEditable(root){
  let idx=0;
  root.querySelectorAll('*').forEach(el=>{
    const tag=el.tagName.toLowerCase();
    if(['style','script','br','hr','link','meta'].includes(tag))return;

    el.setAttribute('data-eidx',idx++);

    // Determine if this is a text element (leaf with text content)
    const isTextTag=TEXT_TAGS.includes(tag);
    const isTextCls=TEXT_CLS.some(c=>el.classList.contains(c));
    const hasChildText=el.querySelector(TEXT_TAGS.join(',')+','+TEXT_CLS.map(c=>'.'+c).join(','));
    const isLeafText=(isTextTag||isTextCls)&&!hasChildText;

    if(isLeafText){
      // Direct inline editing on tap/click
      el.addEventListener('click',function(e){
        e.stopPropagation();
        // Save undo state before first edit
        if(this.contentEditable!=='true'){
          pu(this);
          // Deactivate previous
          pw.querySelectorAll('[contenteditable="true"]').forEach(x=>{x.contentEditable='false';});
          this.contentEditable='true';
          this.focus();
          // Place cursor at tap position
          if(window.getSelection){
            const sel=window.getSelection();
            if(sel.rangeCount===0){
              const range=document.createRange();
              range.selectNodeContents(this);
              range.collapse(false);
              sel.removeAllRanges();
              sel.addRange(range);
            }
          }
        }
        // Also set as current for styles
        selectForStyle(this);
      });

      // Touch support
      el.addEventListener('touchend',function(e){
        if(e.changedTouches.length===1&&this.contentEditable!=='true'){
          e.preventDefault();
          e.stopPropagation();
          pu(this);
          pw.querySelectorAll('[contenteditable="true"]').forEach(x=>{x.contentEditable='false';});
          this.contentEditable='true';
          this.focus();
          selectForStyle(this);
        }
      });
    } else {
      // Non-text elements: click to select for styling
      el.addEventListener('click',function(e){
        e.stopPropagation();
        pw.querySelectorAll('[contenteditable="true"]').forEach(x=>{x.contentEditable='false';});
        selectForStyle(this);
      });
    }
  });
}

// Deselect when clicking canvas background
cv.addEventListener('click',e=>{
  if(e.target===cv||e.target===pw){
    pw.querySelectorAll('[contenteditable="true"]').forEach(x=>{x.contentEditable='false';});
    pw.querySelectorAll('.style-sel').forEach(x=>x.classList.remove('style-sel'));
    curEl=null;ns0.style.display='';sc.style.display='none';
  }
});

// === STYLE SELECTION ===
function selectForStyle(el){
  pw.querySelectorAll('.style-sel').forEach(x=>x.classList.remove('style-sel'));
  curEl=el;
  el.classList.add('style-sel');
  buildStylePanel(el);
}

// === STYLE PANEL ===
function buildStylePanel(el){
  ns0.style.display='none';sc.style.display='';sc.innerHTML='';
  const cs=getComputedStyle(el);
  const tag=el.tagName.toLowerCase();
  const cls=(el.className||'').replace('style-sel','').trim();

  const b=document.createElement('div');b.className='badge';
  b.innerHTML='<span class="t">&lt;'+tag+'&gt;</span> '+(cls?'<span class="c">.'+cls.split(/\s+/).join('.')+'</span>':'');
  sc.appendChild(b);

  mkSec(sc,'Farben');
  mkCP(sc,'Hintergrund',rgbHex(cs.backgroundColor),v=>{pu(el);el.style.backgroundColor=v;});
  mkCP(sc,'Textfarbe',rgbHex(cs.color),v=>{pu(el);el.style.color=v;});
  mkCP(sc,'Rahmen',rgbHex(cs.borderColor),v=>{pu(el);el.style.borderColor=v;});

  const bgImg=cs.backgroundImage;
  if(bgImg&&bgImg!=='none'){
    mkInp(sc,'Background CSS',el.style.background||bgImg,v=>{pu(el);el.style.background=v;});
  }

  const sr=document.createElement('div');sr.className='swr';
  PAL.forEach(c=>{const s=document.createElement('div');s.className='sw';s.style.background=c;
    s.addEventListener('click',()=>{pu(el);el.style.backgroundColor=c;});sr.appendChild(s);});
  sc.appendChild(sr);mkDv(sc);

  mkSec(sc,'Typografie');
  const fg=document.createElement('div');fg.className='eg';
  const fl=document.createElement('label');fl.textContent='Schriftart';fg.appendChild(fl);
  const fsel=document.createElement('select');
  const curF=cs.fontFamily.split(',')[0].replace(/['"]/g,'').trim();
  fsel.innerHTML='<option value="">Standard</option>';
  FONTS.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;if(curF===f)o.selected=true;fsel.appendChild(o);});
  fsel.addEventListener('change',()=>{pu(el);if(fsel.value){const lk=document.createElement('link');lk.rel='stylesheet';lk.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(fsel.value)+':wght@300;400;500;600;700;800&display=swap';document.head.appendChild(lk);el.style.fontFamily="'"+fsel.value+"',sans-serif";}else el.style.fontFamily='';});
  fg.appendChild(fsel);sc.appendChild(fg);

  mkRange(sc,'Groesse',parseInt(cs.fontSize)||14,6,72,'px',v=>{pu(el);el.style.fontSize=v+'px';});
  mkSel(sc,'Gewicht',cs.fontWeight,[['300','Light'],['400','Normal'],['500','Medium'],['600','Semi-Bold'],['700','Bold'],['800','Extra-Bold']],v=>{pu(el);el.style.fontWeight=v;});
  mkSel(sc,'Ausrichtung',cs.textAlign,[['left','Links'],['center','Zentriert'],['right','Rechts']],v=>{pu(el);el.style.textAlign=v;});
  mkDv(sc);

  mkSec(sc,'Abstande');
  mkRange(sc,'Padding',parseInt(cs.padding)||0,0,60,'px',v=>{pu(el);el.style.padding=v+'px';});
  mkRange(sc,'Border-Radius',parseInt(cs.borderRadius)||0,0,30,'px',v=>{pu(el);el.style.borderRadius=v+'px';});
  mkRange(sc,'Deckkraft',parseFloat(cs.opacity)||1,0,1,'',v=>{pu(el);el.style.opacity=v;},.05);
  mkDv(sc);

  // Themes
  mkSec(sc,'Farbschema');
  THEMES.forEach(th=>{
    const c=document.createElement('div');c.className='tc';
    const n=document.createElement('div');n.className='tn';n.textContent=th.n;
    const pr=document.createElement('div');pr.className='tp';
    th.p.forEach(col=>{const s=document.createElement('div');s.className='ts';s.style.background=col;pr.appendChild(s);});
    c.appendChild(n);c.appendChild(pr);
    c.addEventListener('click',()=>applyTheme(th));
    sc.appendChild(c);
  });
  mkDv(sc);

  const rb=document.createElement('button');rb.className='bw';rb.style.cssText='width:100%;justify-content:center;font-size:12px;padding:10px;min-height:44px;';
  rb.textContent='Styles zuruecksetzen';
  rb.addEventListener('click',()=>{pu(el);el.removeAttribute('style');buildStylePanel(el);toast('Reset');});
  sc.appendChild(rb);
}

function applyTheme(th){
  const css=pw.querySelector('#posterCSS')||pw.querySelector('style');
  if(!css)return;
  let t=css.textContent;
  Object.entries(th.c).forEach(([k,v])=>{t=t.replace(new RegExp(k.replace(/[-[\]{}()*+?.,\\^$|#\s]/g,'\\$&')+':\\s*#[0-9a-fA-F]{3,8}','g'),k+':'+v);});
  css.textContent=t;
  const mf=pw.querySelector('.main-finding');
  if(mf&&th.c['--c-accent-dark']){const a=th.c['--c-accent-dark'];mf.style.background='linear-gradient(145deg,'+dk(a,.3)+','+dk(a,.15)+' 40%,'+a+')';}
  const hb=pw.querySelector('.header-bar');
  if(hb&&th.c['--c-accent'])hb.style.backgroundColor=th.c['--c-accent'];
  toast('Theme: '+th.n);
}

function dk(h,a){h=h.replace('#','');let r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);return'#'+[Math.max(0,Math.round(r*(1-a))),Math.max(0,Math.round(g*(1-a))),Math.max(0,Math.round(b*(1-a)))].map(x=>x.toString(16).padStart(2,'0')).join('');}

// === FORM HELPERS ===
function mkSec(p,t){const d=document.createElement('div');d.className='sec';d.textContent=t;p.appendChild(d);}
function mkDv(p){const d=document.createElement('div');d.className='dv';p.appendChild(d);}
function mkCP(par,lbl,val,fn){
  const g=document.createElement('div');g.className='eg';
  const l=document.createElement('label');l.textContent=lbl;g.appendChild(l);
  const r=document.createElement('div');r.className='cr';
  const pk=document.createElement('input');pk.type='color';pk.value=val&&val!=='transparent'&&val!==''?val:'#ffffff';
  const tx=document.createElement('input');tx.type='text';tx.value=val||'transparent';
  pk.addEventListener('input',()=>{tx.value=pk.value;fn(pk.value);});
  tx.addEventListener('change',()=>{try{pk.value=tx.value;}catch(e){}fn(tx.value);});
  r.appendChild(pk);r.appendChild(tx);g.appendChild(r);par.appendChild(g);
}
function mkInp(par,lbl,val,fn){
  const g=document.createElement('div');g.className='eg';const l=document.createElement('label');l.textContent=lbl;g.appendChild(l);
  const i=document.createElement('input');i.type='text';i.value=val;i.style.cssText='width:100%;background:var(--ub);border:1px solid var(--ubr);border-radius:6px;color:var(--ut);font-family:monospace;font-size:12px;padding:8px;';
  i.addEventListener('change',()=>fn(i.value));g.appendChild(i);par.appendChild(g);
}
function mkRange(par,lbl,val,min,max,unit,fn,step){
  const g=document.createElement('div');g.className='eg';const l=document.createElement('label');l.textContent=lbl;g.appendChild(l);
  const r=document.createElement('div');r.className='rr';
  const rng=document.createElement('input');rng.type='range';rng.min=min;rng.max=max;rng.step=step||1;rng.value=val;
  const v=document.createElement('span');v.className='rv';v.textContent=(step&&step<1?parseFloat(val).toFixed(2):Math.round(val))+unit;
  rng.addEventListener('input',()=>{const n=step&&step<1?parseFloat(rng.value):parseInt(rng.value);v.textContent=(step&&step<1?n.toFixed(2):n)+unit;fn(n);});
  r.appendChild(rng);r.appendChild(v);g.appendChild(r);par.appendChild(g);
}
function mkSel(par,lbl,cur,opts,fn){
  const g=document.createElement('div');g.className='eg';const l=document.createElement('label');l.textContent=lbl;g.appendChild(l);
  const s=document.createElement('select');
  opts.forEach(([v,t])=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(cur==v)o.selected=true;s.appendChild(o);});
  s.addEventListener('change',()=>fn(s.value));g.appendChild(s);par.appendChild(g);
}

// === UNDO ===
function pu(el){undos.push({el,s:el.getAttribute('style')||'',h:el.innerHTML});if(undos.length>80)undos.shift();$('bu').disabled=false;}
$('bu').addEventListener('click',()=>{
  if(!undos.length)return;const s=undos.pop();
  if(s.s)s.el.setAttribute('style',s.s);else s.el.removeAttribute('style');
  s.el.innerHTML=s.h;s.el.contentEditable='false';
  $('bu').disabled=!undos.length;
  if(s.el===curEl)buildStylePanel(curEl);
});

// === ZOOM ===
function setZ(l){zoom=Math.max(.1,Math.min(2,l));pw.style.transform='scale('+zoom+')';zl.textContent=Math.round(zoom*100)+'%';}
$('zi').addEventListener('click',()=>setZ(zoom+.1));
$('zo').addEventListener('click',()=>setZ(zoom-.1));
$('zf').addEventListener('click',fitZ);
function fitZ(){const p=pw.querySelector('.poster');if(!p)return;setZ(Math.min((cv.clientWidth-40)/(p.offsetWidth||1190),(cv.clientHeight-40)/(p.offsetHeight||1684),1));}
cv.addEventListener('wheel',(e)=>{if(e.ctrlKey){e.preventDefault();setZ(zoom+(e.deltaY>0?-.05:.05));}},{passive:false});

// Pinch zoom
let pinS=0,pinZ=0;
cv.addEventListener('touchstart',e=>{if(e.touches.length===2){pinS=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);pinZ=zoom;}},{passive:true});
cv.addEventListener('touchmove',e=>{if(e.touches.length===2&&pinS){setZ(pinZ*(Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)/pinS));}},{passive:true});
cv.addEventListener('touchend',()=>{pinS=0;},{passive:true});

// === EXPORT ===
$('bpdf').addEventListener('click',()=>{
  const poster=pw.querySelector('.poster');if(!poster)return;
  pw.querySelectorAll('[contenteditable="true"]').forEach(x=>{x.contentEditable='false';});
  const cl=poster.cloneNode(true);
  cl.querySelectorAll('[data-eidx]').forEach(e=>e.removeAttribute('data-eidx'));
  cl.querySelectorAll('.style-sel').forEach(e=>e.classList.remove('style-sel'));
  let css='';pw.querySelectorAll('style').forEach(s=>css+=s.textContent);
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>'+css+'body{margin:0;padding:0;display:flex;justify-content:center;background:white;}@media print{.poster{box-shadow:none;}}@page{margin:0;}</style></head><body>'+cl.outerHTML+'</body></html>';
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),1200);
});

$('bx').addEventListener('click',()=>{
  if(!origHTML)return;const poster=pw.querySelector('.poster');if(!poster)return;
  pw.querySelectorAll('[contenteditable="true"]').forEach(x=>{x.contentEditable='false';});
  const cl=poster.cloneNode(true);
  cl.querySelectorAll('[data-eidx]').forEach(e=>e.removeAttribute('data-eidx'));
  cl.querySelectorAll('.style-sel').forEach(e=>e.classList.remove('style-sel'));
  let css='';pw.querySelectorAll('style').forEach(s=>css+=s.textContent);
  const out='<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Poster</title><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#E8E8E8;display:flex;justify-content:center;padding:20px;font-family:var(--font-body)}'+css+'</style></head><body>'+cl.outerHTML+'</body></html>';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([out],{type:'text/html;charset=utf-8'}));
  a.download=fname.replace(/\.html?$/i,'_bearbeitet.html');a.click();toast('Gespeichert!');
});

// === UTIL ===
function rgbHex(rgb){if(!rgb||rgb==='transparent'||rgb==='rgba(0, 0, 0, 0)')return'';const m=rgb.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);if(!m)return rgb;return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');}
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');setTimeout(()=>toastEl.classList.remove('show'),2500);}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();$('bu').click();}
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();$('bx').click();}
});
window.addEventListener('resize',()=>{chkM();if(cv.style.display==='flex')fitZ();});
chkM();
})();
</script>
